name: Deploy Hub API (Cloudflare)

on:
  push:
    branches: ["main"]
    paths:
      - "apps/hub-api/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-hub-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-hub-api
  cancel-in-progress: false

jobs:
  deploy-hub-api:
    name: Deploy hub-api Worker
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: PROD

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations (remote)
        run: npm run d1:migrate:remote --workspace @tribus/hub-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ vars.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: npm run deploy:hub-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ vars.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
