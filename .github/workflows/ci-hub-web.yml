name: Build & quality checks — Hub Web

on:
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "next.config.*"
      - "postcss.config.*"
      - "tailwind.config.*"
      - "eslint.config.*"
      - "vitest.config.ts"
      - "vitest.setup.ts"
      - "tests/**"
      - ".github/workflows/ci-hub-web.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "next.config.*"
      - "postcss.config.*"
      - "tailwind.config.*"
      - "eslint.config.*"
      - "vitest.config.ts"
      - "vitest.setup.ts"
      - "tests/**"
      - ".github/workflows/ci-hub-web.yml"

concurrency:
  group: ci-hub-web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Format, Lint, Typecheck, Test & Build (Hub Web)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: PROD

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:coverage -- --reporter=json --outputFile=.vitest-coverage.json
        env:
          AUTH_SECRET: ${{ vars.AUTH_SECRET }}
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ vars.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ vars.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}

      - name: Publish coverage snapshot
        if: github.event_name == 'push' && vars.MONITOR_API_URL != ''
        env:
          MONITOR_API_URL: ${{ vars.MONITOR_API_URL }}
          MONITOR_COVERAGE_TOKEN: ${{ vars.MONITOR_COVERAGE_TOKEN }}
        run: node scripts/publish-coverage.mjs .vitest-coverage.json

      - name: Build
        run: npm run build
        env:
          AUTH_SECRET: ${{ vars.AUTH_SECRET }}
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ vars.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ vars.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
